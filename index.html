<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
    <!-- PWA -->
    <link rel="manifest" href="/WorldCupHub/manifest.webmanifest" />
    <meta name="theme-color" content="#0B0F14" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="WC Hub" />
    <link rel="apple-touch-icon" href="/WorldCupHub/icon.svg" />

    <!-- SEO -->
    <meta name="description" content="FIFA World Cup history — every edition from Uruguay 1930 to USA/Canada/Mexico 2026. Live scores, standings, records and head-to-head stats." />

    <!-- Open Graph -->
